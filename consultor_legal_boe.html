<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor Legal y BOE con IA</title>
    <!-- Tailwind CSS para los estilos base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            transition: background-color 0.5s ease;
        }

        /* Animación para el borde de "Ultra Peligroso" */
        @keyframes move-stripes {
            0% { background-position: 0 0; }
            100% { background-position: 56.57px 56.57px; } /* 40 * sqrt(2) para 45deg */
        }

        /* Borde animado usando máscara para vaciar el centro */
        .stripes-border {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            border: 25px solid transparent;
            background: repeating-linear-gradient(
                -45deg,
                #000000,
                #000000 20px,
                #ffcc00 20px,
                #ffcc00 40px
            );
            background-size: 113px 113px;
            animation: move-stripes 1.5s linear infinite;
            -webkit-mask: 
            linear-gradient(#fff 0 0) padding-box, 
            linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        display: none;
    }

    /* Spinner de carga personalizado */
    .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .theme-dark-bg { background-color: #111827 !important; color: white; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Efectos visuales para el estado ULTRA PELIGROSO -->
    <div id="danger-border" class="stripes-border"></div>

    <!-- Contenedor Principal -->
    <div class="max-w-4xl mx-auto relative z-10" id="main-container">
        
        <!-- Cabecera -->
        <header class="mb-8 text-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100 transition-colors" id="header-card">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2 flex items-center justify-center gap-3" id="main-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Asesor Legal BOE IA
            </h1>
            <p class="text-gray-500">Consulta la legalidad de acciones, procedimientos y posibles consecuencias según la legislación española (BOE/Administración).</p>
        </header>

        <!-- Formulario -->
        <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-8 border border-gray-200 transition-colors" id="form-card">
            <form id="query-form" class="space-y-6">
                <div>
                    <label for="categoria" class="block text-sm font-semibold text-gray-700 mb-2">Categoría del ámbito legal:</label>
                    <select id="categoria" required class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors">
                        <option value="General" selected>General / No lo sé</option>
                        <option value="Menores">Protección de Menores</option>
                        <option value="Educacion">Educación</option>
                        <option value="Penal">Derecho Penal (Delitos)</option>
                        <option value="Laboral">Derecho Laboral (Trabajo)</option>
                        <option value="Trafico">Tráfico y Seguridad Vial</option>
                        <option value="Civil">Derecho Civil (Contratos, Familia)</option>
                        <option value="Administrativo">Derecho Administrativo</option>
                    </select>
                </div>

                <div>
                    <label for="descripcion" class="block text-sm font-semibold text-gray-700 mb-2">Describe la situación o acción:</label>
                    <textarea id="descripcion" rows="4" required class="block p-4 w-full text-sm text-gray-900 bg-gray-50 rounded-xl border border-gray-300 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Ej: ¿Es legal grabar a un profesor durante una clase sin su permiso y subirlo a internet?"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-xl text-lg px-5 py-4 text-center transition-all shadow-md flex justify-center items-center">
                    <span id="btn-text">Analizar Legalidad</span>
                </button>
            </form>
        </div>

        <!-- Resultados (Oculto por defecto) -->
        <div id="results-container" class="hidden bg-white rounded-2xl shadow-xl p-6 md:p-8 border-l-8 transition-all duration-500">
            
            <div class="flex items-center justify-between mb-6 border-b pb-4 border-opacity-20" id="result-header">
                <div>
                    <h2 class="text-2xl font-bold uppercase tracking-wider" id="gravedad-title">ESTADO</h2>
                    <p class="text-sm opacity-80 mt-1" id="veredicto-text">Veredicto corto aquí...</p>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Explicación -->
                <div>
                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        Análisis Detallado
                    </h3>
                    <p id="explicacion-text" class="leading-relaxed opacity-90"></p>
                </div>

                <!-- Medidas y Procedimientos -->
                <div class="bg-black bg-opacity-5 p-4 rounded-xl">
                    <h3 class="text-lg font-bold mb-3 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        Medidas y Procedimientos
                    </h3>
                    <ul id="medidas-list" class="list-disc list-inside space-y-1 opacity-90 ml-2">
                        <!-- Generado por JS -->
                    </ul>
                </div>

                <!-- Condenas -->
                <div class="bg-red-500 bg-opacity-10 p-4 rounded-xl border border-red-500 border-opacity-20" id="condenas-container">
                    <h3 class="text-lg font-bold mb-3 flex items-center gap-2 text-red-700" id="condenas-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                        Posibles Sanciones o Condenas
                    </h3>
                    <ul id="condenas-list" class="list-disc list-inside space-y-1 text-red-900 opacity-90 ml-2">
                        <!-- Generado por JS -->
                    </ul>
                </div>

                <!-- Fuentes BOE -->
                <div class="text-sm border-t pt-4 border-opacity-20 mt-6">
                    <h4 class="font-bold mb-2 uppercase tracking-wide opacity-70">Fuentes Legales (BOE / Admin.gob.es):</h4>
                    <ul id="fuentes-list" class="list-none space-y-1 opacity-80">
                        <!-- Generado por JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
    const form = document.getElementById('query-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const resultsContainer = document.getElementById('results-container');
    
    // Elementos visuales extremos
    const dangerBorder = document.getElementById('danger-border');
    const bodyElement = document.body;
    const mainContainer = document.getElementById('main-container');
    const headerCard = document.getElementById('header-card');
        const formCard = document.getElementById('form-card');
        const mainTitle = document.getElementById('main-title');

        // Función principal al enviar formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const categoria = document.getElementById('categoria').value;
            const descripcion = document.getElementById('descripcion').value;

            // UI a estado de carga
            btnText.innerHTML = '<span class="loader"></span> Analizando BOE...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            resultsContainer.classList.add('hidden');
            resetDangerState();

            try {
                const result = await callGeminiAPI(categoria, descripcion);
                renderResults(result);
            } catch (error) {
                console.error("Error al analizar:", error);
                alert("Hubo un error al conectar con la base de datos legal. Por favor, inténtalo de nuevo en unos segundos.");
            } finally {
                // Restaurar botón
                btnText.innerText = 'Analizar Legalidad';
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        async function callGeminiAPI(categoria, descripcion) {
            const apiKey = ""; // API Key proveída por el entorno Canvas
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            const systemPrompt = `Eres un estricto Asesor Legal Español. Tu objetivo es analizar la situación proporcionada por el usuario, categorizada como "${categoria}".
REGLAS ESTRICTAS:
1. BASA tus respuestas ÚNICAMENTE en la legislación española real vigente (Código Penal, Código Civil, Estatuto de los Trabajadores, leyes orgánicas, etc.) verificables en el BOE (Boletín Oficial del Estado) y administracion.gob.es.
2. NO INVENTES LEYES NI ARTÍCULOS. Si no estás seguro, indica que la legislación no es clara o no está tipificado de forma explícita.
3. Evalúa la gravedad y clasifícala OBLIGATORIAMENTE en uno de estos 5 niveles:
    - "LEGAL": Está permitido por la ley.
    - "ALEGAL": No es ilegal técnicamente, pero es una mala práctica, está en un vacío legal, o puede tener consecuencias negativas civiles leves.
    - "LEVE": Infracción administrativa o delito leve (multas pequeñas).
    - "GRAVE": Delito grave o infracción muy grave (cárcel, multas severas).
    - "ULTRA_PELIGROSO": Delitos extremadamente graves, crímenes de sangre, terrorismo, abusos gravísimos a menores, traición, etc. Algo que arruina vidas inmediatamente.

Devuelve tu análisis estrictamente siguiendo este esquema JSON.`;

            const payload = {
                contents: [{ parts: [{ text: `Analiza esta situación: "${descripcion}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            "gravedad": { 
                                type: "STRING", 
                                enum: ["LEGAL", "ALEGAL", "LEVE", "GRAVE", "ULTRA_PELIGROSO"] 
                            },
                            "veredicto": { 
                                type: "STRING",
                                description: "Resumen muy breve de si es legal o no."
                            },
                            "explicacion_detallada": { 
                                type: "STRING",
                                description: "Explicación de por qué es legal o ilegal según la ley."
                            },
                            "medidas_procedimientos": {
                                type: "ARRAY",
                                items: { type: "STRING" },
                                description: "Qué medidas legales puede tomar el usuario, dónde denunciar, procedimientos (ej: Policía, Inspección trabajo, Demanda civil)."
                            },
                            "posibles_condenas": {
                                type: "ARRAY",
                                items: { type: "STRING" },
                                description: "En caso de ser infractor, qué multas o penas exactas enfrenta. Vacío si es Legal."
                            },
                            "fuentes_boe": {
                                type: "ARRAY",
                                items: { type: "STRING" },
                                description: "Leyes o artículos aplicables (Ej: Art. 138 Código Penal, Ley Orgánica 3/2018 de Protección de Datos)."
                            }
                        },
                        required: ["gravedad", "veredicto", "explicacion_detallada", "medidas_procedimientos", "posibles_condenas", "fuentes_boe"]
                    }
                }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error("Error en la respuesta de la API");
            
            const result = await response.json();
            const textJson = result.candidates[0].content.parts[0].text;
            return JSON.parse(textJson);
        }

        function renderResults(data) {
            const container = document.getElementById('results-container');
            const title = document.getElementById('gravedad-title');
            const veredicto = document.getElementById('veredicto-text');
            const exp = document.getElementById('explicacion-text');
            const medidasList = document.getElementById('medidas-list');
            const condenasContainer = document.getElementById('condenas-container');
            const condenasList = document.getElementById('condenas-list');
            const condenasTitle = document.getElementById('condenas-title');
            const fuentesList = document.getElementById('fuentes-list');

            // Limpiar clases previas
            container.className = 'bg-white rounded-2xl shadow-xl p-6 md:p-8 border-l-8 transition-all duration-500 block text-gray-900';
            title.className = 'text-2xl font-bold uppercase tracking-wider';
            
            // Textos
            title.innerText = data.gravedad.replace('_', ' ');
            veredicto.innerText = data.veredicto;
            exp.innerText = data.explicacion_detallada;

            // Listas
            medidasList.innerHTML = data.medidas_procedimientos.map(m => `<li>${m}</li>`).join('');
            
            if (data.posibles_condenas.length === 0 || data.gravedad === "LEGAL") {
                condenasContainer.style.display = 'none';
            } else {
                condenasContainer.style.display = 'block';
                condenasList.innerHTML = data.posibles_condenas.map(c => `<li>${c}</li>`).join('');
            }

            fuentesList.innerHTML = data.fuentes_boe.map(f => `<li>• ${f}</li>`).join('');

            // Aplicar Estilos por Gravedad
            aplicarEstilosGravedad(data.gravedad, container, title, condenasContainer, condenasTitle, condenasList);
            
            // Mostrar
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function aplicarEstilosGravedad(gravedad, container, title, condenasCont, condenasTitle, condenasList) {
            switch(gravedad) {
                case "LEGAL":
                    container.classList.add('border-green-500', 'bg-green-50');
                    title.classList.add('text-green-700');
                    break;
                case "ALEGAL":
                    // Ni ilegal pero malo
                    container.classList.add('border-yellow-400', 'bg-yellow-50');
                    title.classList.add('text-yellow-700');
                    title.innerText = "NO ES ILEGAL, PERO...";
                    condenasCont.className = 'bg-yellow-500 bg-opacity-10 p-4 rounded-xl border border-yellow-500 border-opacity-20';
                    condenasTitle.className = 'text-lg font-bold mb-3 flex items-center gap-2 text-yellow-800';
                    condenasList.className = 'list-disc list-inside space-y-1 text-yellow-900 opacity-90 ml-2';
                    break;
                case "LEVE":
                    container.classList.add('border-orange-500', 'bg-orange-50');
                    title.classList.add('text-orange-700');
                    condenasCont.className = 'bg-orange-500 bg-opacity-10 p-4 rounded-xl border border-orange-500 border-opacity-20';
                    condenasTitle.className = 'text-lg font-bold mb-3 flex items-center gap-2 text-orange-800';
                    condenasList.className = 'list-disc list-inside space-y-1 text-orange-900 opacity-90 ml-2';
                    break;
                case "GRAVE":
                    container.classList.add('border-red-600', 'bg-red-50');
                    title.classList.add('text-red-700');
                    condenasCont.className = 'bg-red-600 bg-opacity-10 p-4 rounded-xl border border-red-600 border-opacity-30';
                    condenasTitle.className = 'text-lg font-bold mb-3 flex items-center gap-2 text-red-800';
                    condenasList.className = 'list-disc list-inside space-y-1 text-red-900 opacity-90 ml-2';
                    break;
                case "ULTRA_PELIGROSO":
                    // ESTADO EXTREMO
                    container.classList.add('border-black', 'bg-gray-900', 'text-white');
                    container.classList.remove('text-gray-900', 'bg-white');
                    title.classList.add('text-red-500', 'font-black', 'text-4xl', 'animate-pulse');
                    
                    condenasCont.className = 'bg-red-900 bg-opacity-50 p-4 rounded-xl border-2 border-red-600';
                    condenasTitle.className = 'text-lg font-bold mb-3 flex items-center gap-2 text-red-400';
                    condenasList.className = 'list-disc list-inside space-y-1 text-red-200 opacity-100 ml-2 font-semibold';
                    
                    activarEstadoUltraPeligroso();
                    break;
            }
        }

        function activarEstadoUltraPeligroso() {
        // Activar bordes y texto
        dangerBorder.style.display = 'block';
        
        // Oscurecer el fondo
        bodyElement.classList.add('theme-dark-bg');
        
        // Modificar las tarjetas para que encajen en el modo oscuro
            headerCard.classList.remove('bg-white', 'border-gray-100');
            headerCard.classList.add('bg-gray-800', 'border-red-900', 'text-white');
            mainTitle.classList.remove('text-gray-800');
            mainTitle.classList.add('text-red-500');
            
            formCard.classList.remove('bg-white', 'border-gray-200');
            formCard.classList.add('bg-gray-800', 'border-red-900');
            
            const labels = formCard.querySelectorAll('label');
            labels.forEach(l => {
                l.classList.remove('text-gray-700');
                l.classList.add('text-gray-200');
            });
        }

        function resetDangerState() {
        // Desactivar efectos extremos
        dangerBorder.style.display = 'none';
        bodyElement.classList.remove('theme-dark-bg');
        
        // Restaurar tarjetas
        headerCard.classList.add('bg-white', 'border-gray-100');
            headerCard.classList.remove('bg-gray-800', 'border-red-900', 'text-white');
            mainTitle.classList.add('text-gray-800');
            mainTitle.classList.remove('text-red-500');
            
            formCard.classList.add('bg-white', 'border-gray-200');
            formCard.classList.remove('bg-gray-800', 'border-red-900');
            
            const labels = formCard.querySelectorAll('label');
            labels.forEach(l => {
                l.classList.add('text-gray-700');
                l.classList.remove('text-gray-200');
            });
        }
    </script>
</body>
</html>
